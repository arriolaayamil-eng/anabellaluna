# ─────────────────────────────────────────────────────────────────────────────
# nginx-og.conf  –  Configuración Nginx para Open Graph dinámico en Anabella Luna
# ─────────────────────────────────────────────────────────────────────────────
#
# INSTRUCCIONES DE INSTALACIÓN:
# 1. Copiar este bloque dentro del server{} activo de Anabella Luna en:
#    /etc/nginx/sites-available/anabellaluna
# 2. Recargar Nginx: sudo nginx -t && sudo nginx -s reload
#
# ORDEN CRÍTICO dentro del server{} — copiar en este orden:
#
#   location /public/     →  proxy al backend (media, API)
#   location /auth/       →  proxy al backend
#   location /crm/        →  proxy al backend
#   location /admin/      →  proxy al backend
#   location /api/        →  proxy al backend
#   location ~* ^/(buy|rent)/  →  proxy al backend (OG renderer) ← NUEVO
#   location /            →  archivos estáticos SPA con try_files  ← sin cambios
#
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name anabellaluna.com.ar www.anabellaluna.com.ar;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anabellaluna.com.ar www.anabellaluna.com.ar;

    # ── SSL (ajustar rutas a tus certificados) ───────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/anabellaluna.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anabellaluna.com.ar/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # ── Backend API: /public/* ───────────────────────────────────────────────
    location /public/ {
        proxy_pass http://127.0.0.1:4000/public/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Backend API: /auth/* ─────────────────────────────────────────────────
    location /auth/ {
        proxy_pass http://127.0.0.1:4000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Backend API: /crm/* ──────────────────────────────────────────────────
    location /crm/ {
        proxy_pass http://127.0.0.1:4000/crm/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Backend API: /admin/* ────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://127.0.0.1:4000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Backend API: /api/* ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Backend API: /documents/* y /files/* ─────────────────────────────────
    location /documents/ {
        proxy_pass http://127.0.0.1:4000/documents/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /files/ {
        proxy_pass http://127.0.0.1:4000/files/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── NUEVO: Open Graph renderer para rutas de propiedad ───────────────────
    # Las rutas /buy/:slug y /rent/:slug son manejadas por Express, que inyecta
    # los meta tags OG dinámicos antes de devolver el index.html.
    # El resto del SPA sigue siendo estático (location / más abajo).
    #
    location ~ ^/(buy|rent)/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;

        # Cache corto: permite que los crawlers re-validen luego de actualizaciones
        proxy_cache_bypass $http_pragma;
        add_header Cache-Control "public, max-age=300";
    }

    # ── Frontend SPA: todo lo demás (estático) ───────────────────────────────
    location / {
        root /var/www/anabella/frontend/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Assets con caché larga ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/anabella/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
