<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" style="background: transparent; margin: auto;">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">AI Chat Orb Animation</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Animated glassy AI orb with concentric flame rings and sparkle icon</desc>

  <defs>
    <radialGradient id="orbCore" cx="42%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#c8b4ff"/>
      <stop offset="35%" stop-color="#9b6dff"/>
      <stop offset="75%" stop-color="#6b3de8"/>
      <stop offset="100%" stop-color="#3d1a9e"/>
    </radialGradient>

    <radialGradient id="ring1Grad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#7c55f5" stop-opacity="0"/>
      <stop offset="85%" stop-color="#9b6dff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b48aff" stop-opacity="0.7"/>
    </radialGradient>

    <radialGradient id="ring2Grad" cx="50%" cy="50%" r="50%">
      <stop offset="65%" stop-color="#5b3de8" stop-opacity="0"/>
      <stop offset="85%" stop-color="#c06cf0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e090ff" stop-opacity="0.55"/>
    </radialGradient>

    <radialGradient id="ring3Grad" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#3a1fb5" stop-opacity="0"/>
      <stop offset="88%" stop-color="#e060c0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ff80d5" stop-opacity="0.38"/>
    </radialGradient>

    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7040e0" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#5020c0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#300080" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="highlight" cx="38%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="60%" stop-color="#d8c8ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#9b6dff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <filter id="ringBlur">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- ambient glow bg -->
  <circle cx="100" cy="100" r="90" fill="url(#glowBg)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.797421;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="r" values="82;92;82" dur="3.8s" repeatCount="indefinite" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3.8s" repeatCount="indefinite" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </circle>

  <!-- ring 3 - outermost flame -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#cc66ff" stroke-width="10" stroke-opacity="0.22" filter="url(#softBlur)" style="fill:none;stroke:rgb(204, 102, 255);color:rgb(255, 255, 255);stroke-width:9.66572px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="r" values="76;82;76" dur="4.2s" repeatCount="indefinite" style="fill:none;stroke:rgb(204, 102, 255);color:rgb(255, 255, 255);stroke-width:9.66572px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <animate attributeName="stroke-opacity" values="0.12;0.3;0.12" dur="4.2s" repeatCount="indefinite" style="fill:none;stroke:rgb(204, 102, 255);color:rgb(255, 255, 255);stroke-width:9.66572px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <animate attributeName="stroke-width" values="8;14;8" dur="4.2s" repeatCount="indefinite" style="fill:none;stroke:rgb(204, 102, 255);color:rgb(255, 255, 255);stroke-width:9.66572px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </circle>

  <!-- ring 2 - mid flame -->
  <circle cx="100" cy="100" r="66" fill="none" stroke="#a855f7" stroke-width="9" stroke-opacity="0.3" filter="url(#ringBlur)" style="fill:none;stroke:rgb(168, 85, 247);color:rgb(255, 255, 255);stroke-width:11.3343px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="r" values="63;69;63" dur="3.5s" repeatCount="indefinite" style="fill:none;stroke:rgb(168, 85, 247);color:rgb(255, 255, 255);stroke-width:11.3343px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <animate attributeName="stroke-opacity" values="0.18;0.42;0.18" dur="3.5s" repeatCount="indefinite" style="fill:none;stroke:rgb(168, 85, 247);color:rgb(255, 255, 255);stroke-width:11.3343px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <animate attributeName="stroke-width" values="7;12;7" dur="3.5s" repeatCount="indefinite" style="fill:none;stroke:rgb(168, 85, 247);color:rgb(255, 255, 255);stroke-width:11.3343px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </circle>

  <!-- ring 1 - inner flame -->
  <circle cx="100" cy="100" r="54" fill="none" stroke="#c084fc" stroke-width="8" stroke-opacity="0.38" filter="url(#ringBlur)" style="fill:none;stroke:rgb(192, 132, 252);color:rgb(255, 255, 255);stroke-width:7.43792px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="r" values="51;57;51" dur="2.9s" repeatCount="indefinite" style="fill:none;stroke:rgb(192, 132, 252);color:rgb(255, 255, 255);stroke-width:7.43792px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <animate attributeName="stroke-opacity" values="0.25;0.55;0.25" dur="2.9s" repeatCount="indefinite" style="fill:none;stroke:rgb(192, 132, 252);color:rgb(255, 255, 255);stroke-width:7.43792px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <animate attributeName="stroke-width" values="6;11;6" dur="2.9s" repeatCount="indefinite" style="fill:none;stroke:rgb(192, 132, 252);color:rgb(255, 255, 255);stroke-width:7.43792px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </circle>

  <!-- orb body -->
  <circle cx="100" cy="100" r="44" fill="url(#orbCore)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="r" values="42;46;42" dur="3.2s" repeatCount="indefinite" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </circle>

  <!-- glass highlight -->
  <circle cx="100" cy="100" r="44" fill="url(#highlight)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="r" values="42;46;42" dur="3.2s" repeatCount="indefinite" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </circle>

  <!-- sparkle icon - big star -->
  <g transform="translate(100,100)" opacity="0.95" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.802833;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2.4s" repeatCount="indefinite" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- 4-pointed star using paths -->
    <path d="M0,-16 C1,-5 5,-1 16,0 C5,1 1,5 0,16 C-1,5 -5,1 -16,0 C-5,-1 -1,-5 0,-16Z" fill="white" opacity="0.95" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.95;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="2.4s" repeatCount="indefinite" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    </path>

    <!-- small star top-right -->
    <path d="M12,-16 C12.4,-13.4 13.4,-12.4 16,-12 C13.4,-11.6 12.4,-10.6 12,-8 C11.6,-10.6 10.6,-11.6 8,-12 C10.6,-12.4 11.6,-13.4 12,-16Z" fill="white" opacity="0.82" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.82;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
      <animateTransform attributeName="transform" type="scale" values="0.9;1.1;0.9" dur="2.8s" repeatCount="indefinite" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    </path>
  </g>

  <!-- thin glass rim -->
  <circle cx="100" cy="100" r="44" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" style="fill:none;stroke:rgba(255, 255, 255, 0.25);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="r" values="42;46;42" dur="3.2s" repeatCount="indefinite" style="fill:none;stroke:rgba(255, 255, 255, 0.25);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </circle>

  <!-- subtle reflection arc -->
  <path d="M82,78 Q90,70 108,74" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round" style="fill:none;stroke:rgba(255, 255, 255, 0.5);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.571282;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <animate attributeName="opacity" values="0.4;0.75;0.4" dur="3.2s" repeatCount="indefinite" style="fill:none;stroke:rgba(255, 255, 255, 0.5);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </path>
</svg>